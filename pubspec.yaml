name: dllne_deliver_app
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.2.0
  bot_toast: ^4.1.3
  dartz: ^0.10.1
  device_preview: ^1.2.0
  dio: ^5.5.0+1
  easy_localization: ^3.0.7
  equatable: ^2.0.5
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.0.10+1
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  injectable: ^3.0.0
  logger: ^2.3.0
  responsive_framework: ^1.4.0
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  location: ^8.0.1
  intl: 0.20.2
  cached_network_image: ^3.4.0
  smooth_page_indicator: ^2.0.1
  pin_code_fields: ^9.3.0
  cupertino_icons: ^1.0.8
  curved_labeled_navigation_bar: ^2.0.5
  flutter_spinkit: ^5.2.1
  numberpicker: ^2.1.2
  marquee: ^2.3.0
  animated_rating_stars: ^1.0.1
  flutter_staggered_animations: ^1.1.1
  permission_handler: ^12.0.0+1
  provider: ^6.1.5
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  awesome_notifications: ^0.11.0
  carousel_slider: ^5.1.1
  flutter_native_splash: ^2.4.7
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.2
  lottie: ^3.3.2
  package_info_plus: ^9.0.0
  device_info_plus: ^11.5.0
  timelines_plus: ^2.0.0
  extended_image:
  rename: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  injectable_generator: ^3.0.2
  flutter_gen_runner: ^5.14.0

  flutter_lints: ^6.0.0

flutter_gen:
  output: lib/common/design/src/theme/
  integrations:
    lottie: true

flutter_native_splash:
  color: "#2F4F46"
  image: assets/images/png/native_splash/native_logo.png
  #    branding: assets/images/branding.png
  android_12:
    image: assets/images/png/native_splash/native_logo12.png
    icon_background_color: "#2F4F46"
  web: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/png/
    - assets/animations/
    - assets/images/png/native_splash/
    - assets/images/png/error/
    - assets/images/png/product/
    - assets/images/png/on_board/
    - assets/images/png/services/
    - assets/images/svg/services/
    - assets/images/svg/
    - assets/images/svg/product/
    - assets/images/svg/contact_us/
    - assets/images/svg/status/
    - assets/images/svg/review/
    - assets/images/svg/log_in/
    - assets/images/svg/notification/
    - assets/images/svg/car/
    - assets/images/svg/order/
    - assets/images/svg/sign_up/
    - assets/images/svg/nav_bar/
    - assets/images/svg/drawer/
    - assets/images/svg/home/
    - assets/images/svg/profile/
    - assets/translations/